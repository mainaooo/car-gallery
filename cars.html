<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Authorized Showroom</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; margin: 0; }
        nav { background: #1a1a2e; padding: 1rem; display: flex; justify-content: space-between; color: white; }
        nav a { color: white; text-decoration: none; margin-left: 20px; font-weight: bold; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
        .card { background: white; border-radius: 6px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; }
        .img-placeholder { height: 180px; background: #eaeaea; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #888; }
        .img-placeholder img { width:100%; height:100%; object-fit:cover; }
        .content { padding: 1.2rem; flex-grow: 1; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; color: white; margin-bottom: 0.5rem; }
        .Top-Selling { background: #e94560; } .New-Model { background: #0f969c; }
        .specs { background: #f8f9fa; padding: 6px; font-size: 0.8rem; font-weight: bold; border-left: 3px solid #1a1a2e; }
    </style>
</head>
<body>
    <nav>
        <span>Maina Catalog (Logged in as: {{ username }})</span>
        <div><a href="/">Home</a><a href="/ads">Ads</a><a href="/logout">Logout</a></div>
    </nav>
    <div class="container">
        <h2>Global Fleet Portfolio ({{ cars|length }} Verified Models)</h2>
        <div class="grid">
            {% for car in cars %}
            <div class="card">
                <div class="img-placeholder"><img src="{{ car.image_url }}" alt="Car Visual"></div>
                <div class="content">
                    <span class="badge {{ car.type.replace(' ', '-') }}">{{ car.type }}</span>
                    <h3 style="margin:0 0 0.5rem 0;">{{ car.name }}</h3>
                    <p style="font-size:0.9rem; color:#555;">{{ car.description }}</p>
                    <div class="specs">{{ car.specs }}</div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
