<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Access Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 2rem; border-radius: 8px; width: 320px; }
        .btn { background: #e94560; color: white; width: 100%; padding: 10px; border: none; font-weight: bold; border-radius: 4px; margin-top: 10px; cursor: pointer; }
        .error { color: red; font-size: 0.85rem; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="margin-top:0; text-align:center;">Portal Login</h2>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST">
            <label style="font-weight:600; font-size:0.9rem;">Username</label>
            <input type="text" name="username" required style="width:100%; padding:8px; margin: 5px 0 15px 0; box-sizing:border-box;">
            <label style="font-weight:600; font-size:0.9rem;">Password</label>
            <input type="password" name="password" required style="width:100%; padding:8px; margin: 5px 0 15px 0; box-sizing:border-box;">
            <button type="submit" class="btn">Authenticate Portal</button>
        </form>
        <p style="font-size:0.75rem; color:#666; background:#eee; padding:5px; margin-top:15px;">
            User login info: <strong>user</strong> / <strong>userpassword</strong>
        </p>
    </div>
</body>
</html>
